<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Trial - IronCore Fitness</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>IronCore Fitness</h1>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="membership.html">Membership</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Free Trial</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="contact">
    <div class="container">

        <h2>Book Your FREE Trial</h2>
        <p>
            Fill out the form below and our team will contact you to
            schedule your free trial session.
        </p>

        <form action="#">

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>

            <label>Choose Membership Plan</label>
            <select required>
                <option value="">Select Plan</option>
                <option>Basic Plan</option>
                <option>Standard Plan</option>
                <option>Premium Plan</option>
            </select>

            <label>Preferred Training Program</label>
            <select required>
                <option value="">Select Program</option>
                <option>Strength Training</option>
                <option>Functional Training</option>
                <option>Powerlifting</option>
            </select>

            <label>Your Message</label>
            <textarea rows="5" placeholder="Write your message here..."></textarea>

            <input type="submit" value="Book Free Trial" class="btn">

        </form>

    </div>
</section>
